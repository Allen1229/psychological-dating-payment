<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心理測驗</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入高質感的明體/宋體字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 歡迎畫面 -->
        <section id="landing-view" class="view active">
            <h1 id="quiz-title">標題</h1>
            <p id="quiz-desc">副標題敘述</p>
            <div class="landing-illustration">
                <!-- 裝飾用 SVG -->
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="100" cy="100" r="90" fill="#f4f4f5"/>
                  <path d="M70,120 L90,140 L140,80" fill="none" stroke="#2c3e50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <button id="start-btn" class="action-btn">開始心測</button>
        </section>

        <!-- 測驗畫面 -->
        <section id="question-view" class="view hidden">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="question-card">
                <h2 id="question-text">題目</h2>
            </div>
            <div id="options-container" class="options-container">
                <!-- 選項動態生成於此 -->
            </div>
        </section>

        <!-- 結果畫面 -->
        <section id="result-view" class="view hidden">
            <div id="loading-spinner" class="spinner">
                <div class="loader"></div>
                <p>正在分析結帳習慣...</p>
            </div>
            <div id="result-content" class="hidden">
                <div class="result-badge">分析結果</div>
                <div class="result-image-wrapper">
                    <img id="result-image" src="" alt="結果圖" />
                </div>
                <h1 id="result-title">結果名稱</h1>
                <div class="dialog-box result-desc-box">
                    <p id="result-desc">結果詳細論述</p>
                </div>
                
                <!-- 控制按鈕 -->
                <div class="action-buttons">
                    <button id="restart-btn" class="action-btn outline">重新測驗</button>
                </div>

                <!-- 分享區塊 -->
                <div class="share-container">
                    <div class="share-buttons">
                        <button id="share-fb" class="share-btn native">分享</button>
                        <button id="share-fb-link" class="share-btn fb">FB</button>
                        <button id="share-threads" class="share-btn threads">脆</button>
                        <button id="share-line" class="share-btn line">LINE</button>
                        <button id="share-ig" class="share-btn ig">IG</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 廣告蓋台 (Ad Modal) -->
        <div id="ad-modal" class="ad-modal hidden">
            <div class="ad-content">
                <button id="ad-close-btn" class="ad-close-btn hidden">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <div id="ad-timer" class="ad-timer">5</div>
                <img id="ad-icon" src="" alt="Game Icon" class="ad-icon" />
                <h2 id="ad-title" class="ad-title">遊戲名稱</h2>
                <p id="ad-desc" class="ad-desc">遊戲簡單文案...</p>
                <button id="ad-action-btn" class="action-btn ad-action-btn">快去玩玩</button>
            </div>
        </div>
    </div>
    
    <!-- 提示工具 -->
    <div id="toast" class="toast hidden">提示訊息</div>
    
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
